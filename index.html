<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Solo System Interface</title>
  <link rel="manifest" href="manifest.json">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
  
  <!-- Web App Manifest & Mobile Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#000000">

  <!-- Load Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Load React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Load modern Babel to understand JSX properly -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { background-color: black; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes fade-in { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fade-in 0.3s ease-out forwards; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
    
    /* Ensure the app takes full height on mobile */
    #root, body, html { height: 100%; overflow: hidden; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- ICON COMPONENT (Replaces Lucide to work purely in HTML) ---
    const Icon = ({ name, size = 24, className = "" }) => {
      const icons = {
        Activity: <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>,
        Settings: <g><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></g>,
        Home: <g><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></g>,
        ListTodo: <g><rect x="3" y="5" width="6" height="6" rx="1"></rect><path d="m3 17 2 2 4-4"></path><path d="M13 6h8"></path><path d="M13 12h8"></path><path d="M13 18h8"></path></g>,
        Trophy: <g><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path></g>,
        TrendingUp: <g><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline><polyline points="16 7 22 7 22 13"></polyline></g>,
        Plus: <g><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></g>,
        CheckSquare: <g><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></g>,
        Square: <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>,
        Download: <g><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></g>,
        Upload: <g><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></g>,
        Trash2: <g><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></g>
      };
      
      return (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          {icons[name]}
        </svg>
      );
    };

    // --- THEME UTILITIES ---
    const neonGreen = "text-green-500";
    const neonBorder = "border-green-500";
    const neonGlow = "shadow-[0_0_10px_rgba(34,197,94,0.4)]";
    const neonGlowStrong = "shadow-[0_0_20px_rgba(34,197,94,0.6)]";
    const bgPanel = "bg-black border border-green-800 border-opacity-50";

    // --- AUDIO & HAPTIC SYSTEM ---
    let audioCtx = null;
    const initAudio = () => {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
    };

    const playTone = (freq, type, duration, vol, delay = 0) => {
      try {
        initAudio();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime + delay);
        gain.gain.setValueAtTime(0, audioCtx.currentTime + delay);
        gain.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + delay + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + delay + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(audioCtx.currentTime + delay);
        osc.stop(audioCtx.currentTime + delay + duration);
      } catch (e) {}
    };

    const sysFeedback = {
      click: () => { playTone(800, 'sine', 0.05, 0.02); if (navigator.vibrate) navigator.vibrate(10); },
      success: () => { playTone(600, 'square', 0.1, 0.02); playTone(800, 'square', 0.15, 0.02, 0.1); if (navigator.vibrate) navigator.vibrate([15, 50, 15]); },
      penalty: () => { playTone(300, 'sawtooth', 0.15, 0.03); playTone(200, 'sawtooth', 0.2, 0.03, 0.15); if (navigator.vibrate) navigator.vibrate([40, 50, 40]); },
      levelUp: () => { playTone(440, 'sine', 0.1, 0.05); playTone(554, 'sine', 0.1, 0.05, 0.1); playTone(659, 'sine', 0.1, 0.05, 0.2); playTone(880, 'sine', 0.3, 0.05, 0.3); if (navigator.vibrate) navigator.vibrate([30, 50, 30, 50, 50]); },
      error: () => { playTone(250, 'square', 0.2, 0.03); if (navigator.vibrate) navigator.vibrate([50, 50, 50]); }
    };

    // --- SYSTEM TIME UTILITY ---
    const getSystemDate = () => {
      const d = new Date();
      if (d.getHours() < 5) d.setDate(d.getDate() - 1);
      return d.toISOString().split('T')[0];
    };

    const getSystemWeek = () => {
      const d = new Date();
      if (d.getHours() < 5) d.setDate(d.getDate() - 1);
      d.setDate(d.getDate() - ((d.getDay() + 6) % 7)); 
      return d.toISOString().split('T')[0]; 
    };

    // --- MAIN COMPONENT ---
    function App() {
      const [isLoaded, setIsLoaded] = useState(false);
      const [showStartPage, setShowStartPage] = useState(false);
      const [lastSystemDate, setLastSystemDate] = useState(null);
      const [lastSystemWeek, setLastSystemWeek] = useState(null);

      const [activeTab, setActiveTab] = useState('home');
      const [xp, setXp] = useState(0);
      const [history, setHistory] = useState([{ id: 0, label: 'System Init', totalXp: 0, timestamp: Date.now() }]);
      
      const [dailyQuests, setDailyQuests] = useState([
        { id: 1, text: '100 Push-ups', xp: 20, completed: false, achievementId: null },
        { id: 2, text: '10km Run', xp: 50, completed: false, achievementId: null }
      ]);
      const [weeklyQuests, setWeeklyQuests] = useState([
        { id: 3, text: 'Clear 3 Dungeons (Workouts)', xp: 200, completed: false, achievementId: null }
      ]);
      const [negativeQuests, setNegativeQuests] = useState([
        { id: 5, text: 'Skipped Daily Training', xp: 50, completed: false }
      ]);
      const [achievements, setAchievements] = useState([
        { id: 4, text: 'First Blood (Complete a task)', xp: 100, completed: false, progress: 0, maxProgress: 0 }
      ]);

      const level = Math.floor(xp / 100) + 1;
      const currentLevelXp = xp % 100;
      const xpProgress = (currentLevelXp / 100) * 100;

      useEffect(() => {
        const saved = localStorage.getItem('system_save_data');
        if (saved) {
          try {
            const data = JSON.parse(saved);
            if (data.xp !== undefined) setXp(data.xp);
            if (data.history) setHistory(data.history);
            if (data.dailyQuests) setDailyQuests(data.dailyQuests);
            if (data.weeklyQuests) setWeeklyQuests(data.weeklyQuests);
            if (data.negativeQuests) setNegativeQuests(data.negativeQuests);
            if (data.achievements) setAchievements(data.achievements);
            if (data.lastSystemDate) setLastSystemDate(data.lastSystemDate);
            if (data.lastSystemWeek) setLastSystemWeek(data.lastSystemWeek);
            
            if (data.lastSystemDate !== getSystemDate()) setShowStartPage(true);
          } catch (e) { setShowStartPage(true); }
        } else {
          setShowStartPage(true);
        }
        setIsLoaded(true);
      }, []);

      useEffect(() => {
        if (!isLoaded) return;
        const data = { xp, history, dailyQuests, weeklyQuests, negativeQuests, achievements, lastSystemDate, lastSystemWeek };
        localStorage.setItem('system_save_data', JSON.stringify(data));
      }, [xp, history, dailyQuests, weeklyQuests, negativeQuests, achievements, lastSystemDate, lastSystemWeek, isLoaded]);

      const handleAcceptDay = () => {
        sysFeedback.levelUp();
        if (lastSystemDate) {
          let totalPenalty = 0;
          dailyQuests.forEach(q => {
            if (!q.completed && !q.queued) totalPenalty += Math.ceil(q.xp * 0.1);
          });
          if (totalPenalty > 0) {
            handleGainXp(-totalPenalty, "System Penalty: Failed Daily Goals");
            sysFeedback.penalty();
          }
        }

        const currentWeek = getSystemWeek();
        const isNewWeek = lastSystemWeek !== currentWeek;

        setDailyQuests(prev => prev.map(q => ({ ...q, completed: false, queued: false })));
        if (isNewWeek) {
          setWeeklyQuests(prev => prev.map(q => ({ ...q, completed: false, queued: false })));
          setLastSystemWeek(currentWeek);
        }

        setLastSystemDate(getSystemDate());
        setShowStartPage(false);
      };

      const handleExport = () => {
        const data = { xp, history, dailyQuests, weeklyQuests, negativeQuests, achievements, lastSystemDate };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `system_data_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        URL.revokeObjectURL(url);
      };

      const handleImportData = (jsonData) => {
        try {
          const data = JSON.parse(jsonData);
          if (data.xp !== undefined) setXp(data.xp);
          if (data.history) setHistory(data.history);
          if (data.dailyQuests) setDailyQuests(data.dailyQuests);
          if (data.weeklyQuests) setWeeklyQuests(data.weeklyQuests);
          if (data.negativeQuests) setNegativeQuests(data.negativeQuests);
          if (data.achievements) setAchievements(data.achievements);
          if (data.lastSystemDate) setLastSystemDate(data.lastSystemDate);
          if (data.lastSystemWeek) setLastSystemWeek(data.lastSystemWeek);
          
          if (data.lastSystemDate !== getSystemDate()) setShowStartPage(true);
          else setShowStartPage(false);
          return true;
        } catch (err) { return false; }
      };

      const handleGainXp = (amount, source) => {
        const oldLevel = Math.floor(xp / 100) + 1;
        const newXp = Math.max(0, xp + amount); 
        const newLevel = Math.floor(newXp / 100) + 1;

        if (newLevel > oldLevel) sysFeedback.levelUp();
        else if (amount > 0) sysFeedback.success();
        else if (amount < 0) sysFeedback.penalty();

        setXp(newXp);
        setHistory([...history, { id: Date.now(), label: source, totalXp: newXp, timestamp: Date.now() }]);
      };

      const updateAchievementProgress = (achId, delta) => {
        setAchievements(prev => prev.map(a => {
          if (a.id === achId && a.maxProgress > 0) {
            const newProg = Math.max(0, Math.min(a.maxProgress, (a.progress || 0) + delta));
            const newlyCompleted = newProg >= a.maxProgress && !a.completed;
            const newlyReverted = newProg < a.maxProgress && a.completed;

            if (newlyCompleted) { handleGainXp(a.xp, `Achievement: ${a.text}`); sysFeedback.levelUp(); }
            if (newlyReverted) handleGainXp(-a.xp, `Achievement Reverted: ${a.text}`);
            
            return { ...a, progress: newProg, completed: newProg >= a.maxProgress };
          }
          return a;
        }));
      };

      const toggleQuest = (id, type) => {
        sysFeedback.click();
        const updater = (items, setItems, isNegative = false) => {
          let linkedAchId = null;
          let toggleDir = 0; 
          const updated = items.map(item => {
            if (item.id === id) {
              const isCompleting = !item.completed;
              toggleDir = isCompleting ? 1 : -1;
              linkedAchId = item.achievementId;
              const xpChange = isNegative ? -item.xp : item.xp;
              const finalXpChange = isCompleting ? xpChange : -xpChange;
              handleGainXp(finalXpChange, isCompleting ? item.text : `Reverted: ${item.text}`);
              return { ...item, completed: isCompleting };
            }
            return item;
          });
          setItems(updated);
          if (linkedAchId && toggleDir !== 0) updateAchievementProgress(linkedAchId, toggleDir);
        };

        if (type === 'daily') updater(dailyQuests, setDailyQuests);
        if (type === 'weekly') updater(weeklyQuests, setWeeklyQuests);
        if (type === 'negative') updater(negativeQuests, setNegativeQuests, true);
        if (type === 'achievement') updater(achievements, setAchievements);
      };

      const deleteQuest = (id, type) => {
        sysFeedback.click();
        if (type === 'daily') setDailyQuests(prev => prev.filter(q => q.id !== id));
        if (type === 'weekly') setWeeklyQuests(prev => prev.filter(q => q.id !== id));
        if (type === 'negative') setNegativeQuests(prev => prev.filter(q => q.id !== id));
        if (type === 'achievement') setAchievements(prev => prev.filter(q => q.id !== id));
      };

      if (!isLoaded) return <div className="min-h-screen bg-black" />;

      if (showStartPage) return <StartPageView dailyQuests={dailyQuests} onAccept={handleAcceptDay} />;

      return (
        <div className={`h-full bg-black ${neonGreen} font-mono flex justify-center`}>
          <div className="w-full max-w-md bg-gray-950 flex flex-col relative overflow-hidden shadow-[0_0_50px_rgba(0,0,0,1)] h-full">
            <div className="absolute inset-0 pointer-events-none bg-[linear-gradient(rgba(18,16,16,0)_50%,rgba(0,0,0,0.25)_50%),linear-gradient(90deg,rgba(255,0,0,0.06),rgba(0,255,0,0.02),rgba(0,0,255,0.06))] bg-[length:100%_4px,3px_100%] z-50 opacity-20"></div>

            <header className="flex justify-between items-center p-4 border-b border-green-900 z-10 bg-black">
              <div className="flex items-center gap-2 text-sm uppercase tracking-widest font-bold">
                <Icon name="Activity" size={18} className="animate-pulse" />
                <span>System</span>
              </div>
              <button onClick={() => { sysFeedback.click(); setActiveTab('settings'); }} className="hover:text-green-300 transition-colors">
                <Icon name="Settings" size={22} />
              </button>
            </header>

            <main className="flex-1 overflow-y-auto p-4 pb-24 z-10 scrollbar-hide">
              {activeTab === 'home' && <HomeView xp={xp} level={level} currentLevelXp={currentLevelXp} xpProgress={xpProgress} onProgressClick={() => setActiveTab('progress')} />}
              {activeTab === 'quests' && <QuestsView daily={dailyQuests} weekly={weeklyQuests} negative={negativeQuests} onToggle={toggleQuest} />}
              {activeTab === 'achievements' && <AchievementsView achievements={achievements} onToggle={toggleQuest} />}
              {activeTab === 'settings' && <SettingsView daily={dailyQuests} weekly={weeklyQuests} negative={negativeQuests} setDaily={setDailyQuests} setWeekly={setWeeklyQuests} setNegativeQuests={setNegativeQuests} setAchievements={setAchievements} achievements={achievements} onDelete={deleteQuest} onExport={handleExport} onImport={handleImportData} onClose={() => setActiveTab('home')} />}
              {activeTab === 'progress' && <ProgressView history={history} onBack={() => setActiveTab('home')} />}
            </main>

            <nav className="absolute bottom-0 w-full bg-black border-t border-green-900 grid grid-cols-3 z-20 pb-safe">
              <NavButton icon={<Icon name="Home" size={24} />} label="Home" isActive={activeTab === 'home'} onClick={() => setActiveTab('home')} />
              <NavButton icon={<Icon name="ListTodo" size={24} />} label="Quests" isActive={activeTab === 'quests'} onClick={() => setActiveTab('quests')} />
              <NavButton icon={<Icon name="Trophy" size={24} />} label="Trophies" isActive={activeTab === 'achievements'} onClick={() => setActiveTab('achievements')} />
            </nav>
          </div>
        </div>
      );
    }

    // --- SUBVIEWS ---
    function StartPageView({ dailyQuests, onAccept }) {
      const potentialPenalty = dailyQuests.reduce((acc, q) => (!q.queued ? acc + Math.ceil(q.xp * 0.1) : acc), 0);
      const activeDailies = dailyQuests.filter(q => !q.queued);

      return (
        <div className={`h-full bg-black ${neonGreen} font-mono flex justify-center items-center p-4`}>
          <div className="w-full max-w-md bg-gray-950 p-6 relative overflow-hidden shadow-[0_0_50px_rgba(34,197,94,0.2)] border border-green-900">
            <div className="absolute inset-0 pointer-events-none bg-[linear-gradient(rgba(18,16,16,0)_50%,rgba(0,0,0,0.25)_50%),linear-gradient(90deg,rgba(255,0,0,0.06),rgba(0,255,0,0.02),rgba(0,0,255,0.06))] bg-[length:100%_4px,3px_100%] z-50 opacity-20"></div>
            <h1 className="text-xl mb-4 border-b border-green-800 pb-2 text-green-400 animate-pulse tracking-widest uppercase font-bold text-center">System Notification</h1>
            <div className="space-y-4 text-sm leading-relaxed mb-8 relative z-10">
               <p><span className="text-green-700">Player:</span> Sarim Maqsood</p>
               <p><span className="text-green-700">Codename:</span> Batman</p>
               <div className="border border-green-900 p-3 bg-black shadow-[inset_0_0_10px_rgba(0,0,0,1)] mt-2">
                 <span className="text-green-700 block mb-1 text-xs uppercase tracking-widest">Quest Description:</span>
                 <p className="text-green-400 text-xs leading-5">
                   &gt; You have entered a blood-pact with your own ambition. To reach the next 'Rank,' you must survive the trials of the day without succumbing to the debuffs of [Indolence] or [Corruption].
                 </p>
               </div>
               <div className="mt-4">
                 <span className="text-green-700 block mb-2 text-xs uppercase tracking-widest">Goals:</span>
                 <ul className="list-disc pl-5 space-y-1 text-green-400 text-xs">
                   {activeDailies.length > 0 
                     ? activeDailies.map(q => <li key={q.id}>{q.text} <span className="text-green-700">({q.xp} XP)</span></li>) 
                     : <li>No goals registered. Survive.</li>}
                 </ul>
               </div>
               <p className="text-xs mt-4"><span className="text-green-700 block uppercase tracking-widest">Buff:</span> <span className="text-blue-400">[Momentum]</span> – All tasks tomorrow become 10% easier.</p>
               <p className="text-xs mt-2"><span className="text-green-700 block uppercase tracking-widest">Exp:</span> Significant progress toward "Goal Achievement."</p>
               <div className="border border-red-900 p-3 bg-red-950 bg-opacity-20 mt-4">
                 <p className="text-red-500 text-xs animate-pulse"><span className="text-red-800 block uppercase tracking-widest mb-1">Penalty for Failure:</span> &gt; {potentialPenalty} XP deduction for skipped tasks today.</p>
               </div>
            </div>
            <div className="mt-8 relative z-10">
               <p className="text-center mb-4 text-green-600 text-xs tracking-widest uppercase">"Will you accept the quest?"</p>
               <button onClick={onAccept} className="w-full py-4 border-2 border-green-500 text-green-400 font-bold tracking-widest hover:bg-green-900 hover:bg-opacity-40 transition-all shadow-[0_0_15px_rgba(34,197,94,0.5)]">
                 [ YES / YES ]
               </button>
            </div>
          </div>
        </div>
      );
    }

    function HomeView({ xp, level, currentLevelXp, xpProgress, onProgressClick }) {
      const dateStr = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      return (
        <div className="flex flex-col h-full animate-fade-in">
          <div className="text-xs text-center text-green-700 mb-6 uppercase tracking-widest">{dateStr}</div>
          <div className="flex-1 flex flex-col items-center justify-center relative">
            <div className={`w-48 h-48 rounded-full border-2 ${neonBorder} ${neonGlowStrong} flex flex-col items-center justify-center bg-black relative mb-8`}>
              <div className="text-green-700 text-sm tracking-widest absolute top-8">LEVEL</div>
              <div className="text-7xl font-bold text-green-400 drop-shadow-[0_0_10px_rgba(34,197,94,0.8)]">{level}</div>
            </div>
            <div className="w-full max-w-xs space-y-2 mb-12">
              <div className="flex justify-between text-xs text-green-600"><span>XP: {xp}</span><span>{currentLevelXp} / 100</span></div>
              <div className="h-3 w-full bg-gray-900 rounded-full overflow-hidden border border-green-900">
                <div className="h-full bg-green-500 shadow-[0_0_10px_#22c55e] transition-all duration-1000 ease-out" style={{ width: `${xpProgress}%` }}></div>
              </div>
            </div>
          </div>
          <button onClick={() => { sysFeedback.click(); onProgressClick(); }} className={`mt-auto mb-4 w-full py-4 bg-gray-900 bg-opacity-50 border ${neonBorder} flex items-center justify-center gap-2 uppercase tracking-widest text-sm hover:bg-green-900 hover:bg-opacity-30 transition-all ${neonGlow}`}>
            <Icon name="TrendingUp" size={18} /> View System Progress
          </button>
        </div>
      );
    }

    function QuestsView({ daily, weekly, negative, onToggle }) {
      const activeDaily = daily.filter(q => !q.queued);
      const queuedDaily = daily.filter(q => q.queued);
      const activeWeekly = weekly.filter(q => !q.queued);
      const queuedWeekly = weekly.filter(q => q.queued);

      return (
        <div className="space-y-8 animate-fade-in">
          <section>
            <h2 className="text-xl border-b border-green-800 pb-2 mb-4 uppercase tracking-widest text-green-400 drop-shadow-[0_0_5px_rgba(34,197,94,0.5)]">Daily Quests</h2>
            <div className="space-y-3">{activeDaily.length === 0 ? <EmptyState text="No daily quests assigned." /> : activeDaily.map(q => <QuestItem key={q.id} item={q} onToggle={() => onToggle(q.id, 'daily')} />)}</div>
            {queuedDaily.length > 0 && <div className="mt-4 border-t border-dashed border-green-900 pt-4"><h3 className="text-xs text-green-700 uppercase tracking-widest mb-3">Queued for Next Day</h3><div className="space-y-3 opacity-60">{queuedDaily.map(q => <QuestItem key={q.id} item={q} />)}</div></div>}
          </section>
          <section>
            <h2 className="text-xl border-b border-green-800 pb-2 mb-4 uppercase tracking-widest text-green-400 drop-shadow-[0_0_5px_rgba(34,197,94,0.5)]">Weekly Quests</h2>
            <div className="space-y-3">{activeWeekly.length === 0 ? <EmptyState text="No weekly quests assigned." /> : activeWeekly.map(q => <QuestItem key={q.id} item={q} onToggle={() => onToggle(q.id, 'weekly')} />)}</div>
            {queuedWeekly.length > 0 && <div className="mt-4 border-t border-dashed border-green-900 pt-4"><h3 className="text-xs text-green-700 uppercase tracking-widest mb-3">Queued for Next Week</h3><div className="space-y-3 opacity-60">{queuedWeekly.map(q => <QuestItem key={q.id} item={q} />)}</div></div>}
          </section>
          <section>
            <h2 className="text-xl border-b border-red-800 pb-2 mb-4 uppercase tracking-widest text-red-400 drop-shadow-[0_0_5px_rgba(239,68,68,0.5)]">Penalties</h2>
            <div className="space-y-3">{negative.length === 0 ? <EmptyState text="No penalties assigned." /> : negative.map(q => <QuestItem key={q.id} item={q} onToggle={() => onToggle(q.id, 'negative')} isNegative={true} />)}</div>
          </section>
        </div>
      );
    }

    function AchievementsView({ achievements, onToggle }) {
      return (
        <div className="animate-fade-in">
          <h2 className="text-xl border-b border-green-800 pb-2 mb-4 uppercase tracking-widest text-green-400 drop-shadow-[0_0_5px_rgba(34,197,94,0.5)]">Achievements</h2>
          <div className="space-y-3">{achievements.length === 0 ? <EmptyState text="No achievements configured." /> : achievements.map(a => <QuestItem key={a.id} item={a} onToggle={a.maxProgress > 0 ? undefined : () => onToggle(a.id, 'achievement')} isAchievement={true} />)}</div>
        </div>
      );
    }

    function SettingsView({ daily, weekly, negative, setDaily, setWeekly, setNegativeQuests, setAchievements, achievements, onDelete, onExport, onImport, onClose }) {
      const [type, setType] = useState('daily');
      const [text, setText] = useState('');
      const [xp, setXp] = useState(10);
      const [linkedAchievement, setLinkedAchievement] = useState('');
      const [isQueued, setIsQueued] = useState(false);
      const [importStatus, setImportStatus] = useState('');
      const fileInputRef = useRef(null);

      const handleAdd = (e) => {
        e.preventDefault();
        if (!text) return;
        const newItem = { id: Date.now(), text, xp: parseInt(xp) || 10, completed: false, achievementId: linkedAchievement ? parseInt(linkedAchievement) : null, queued: (type === 'daily' || type === 'weekly') ? isQueued : false, ...(type === 'achievement' ? { progress: 0, maxProgress: 0 } : {}) };
        if (type === 'daily') setDaily(prev => [...prev, newItem]);
        if (type === 'weekly') setWeekly(prev => [...prev, newItem]);
        if (type === 'negative') setNegativeQuests(prev => [...prev, newItem]);
        if (type === 'achievement') setAchievements(prev => [...prev, newItem]);
        if (linkedAchievement && (type === 'daily' || type === 'weekly')) setAchievements(prev => prev.map(a => a.id === parseInt(linkedAchievement) ? { ...a, maxProgress: (a.maxProgress || 0) + 1 } : a));
        setText(''); setLinkedAchievement(''); setIsQueued(false);
      };

      const handleFileChange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          if (onImport(event.target.result)) { sysFeedback.success(); setImportStatus('SYSTEM DATA RESTORED SUCCESSFULLY.'); }
          else { sysFeedback.error(); setImportStatus('ERROR: DATA CORRUPTION DETECTED.'); }
          setTimeout(() => setImportStatus(''), 3000);
        };
        reader.readAsText(file);
        e.target.value = ''; 
      };

      return (
        <div className="animate-fade-in">
          <div className="flex justify-between items-center border-b border-green-800 pb-2 mb-6"><h2 className="text-xl uppercase tracking-widest text-green-400">System Configuration</h2><button onClick={() => { sysFeedback.click(); onClose(); }} className="text-xs border border-green-800 px-2 py-1 hover:bg-green-900">BACK</button></div>
          <form onSubmit={(e) => { sysFeedback.click(); handleAdd(e); }} className={`p-4 ${bgPanel} flex flex-col gap-4 mb-6 shadow-[inset_0_0_15px_rgba(0,0,0,1)]`}>
            <div><label className="block text-xs text-green-600 mb-1 uppercase tracking-wider">Entity Type</label><select value={type} onChange={e => { setType(e.target.value); setLinkedAchievement(''); }} className="w-full bg-gray-950 border border-green-900 text-green-500 p-2 focus:outline-none focus:border-green-400 uppercase text-sm"><option value="daily">Daily Quest</option><option value="weekly">Weekly Quest</option><option value="negative">Negative Quest (Penalty)</option><option value="achievement">Achievement</option></select></div>
            {(type === 'daily' || type === 'weekly') && (<div><label className="block text-xs text-green-600 mb-1 uppercase tracking-wider">Deployment Schedule</label><select value={isQueued ? 'queued' : 'active'} onChange={e => setIsQueued(e.target.value === 'queued')} className="w-full bg-gray-950 border border-green-900 text-green-500 p-2 focus:outline-none focus:border-green-400 uppercase text-sm"><option value="active">Active Now</option><option value="queued">Queue for Next {type === 'daily' ? 'Day' : 'Week'}</option></select></div>)}
            <div><label className="block text-xs text-green-600 mb-1 uppercase tracking-wider">Description</label><input type="text" value={text} onChange={e => setText(e.target.value)} className="w-full bg-gray-950 border border-green-900 text-green-500 p-2 focus:outline-none focus:border-green-400 placeholder-green-900" placeholder="e.g. Defeat the Boss" required /></div>
            <div><label className="block text-xs text-green-600 mb-1 uppercase tracking-wider">{type === 'negative' ? 'XP Penalty' : 'XP Reward'}</label><input type="number" value={xp} onChange={e => setXp(e.target.value)} className="w-full bg-gray-950 border border-green-900 text-green-500 p-2 focus:outline-none focus:border-green-400" min="1" required /></div>
            {(type === 'daily' || type === 'weekly') && (<div><label className="block text-xs text-green-600 mb-1 uppercase tracking-wider">Link to Achievement (Optional)</label><select value={linkedAchievement} onChange={e => setLinkedAchievement(e.target.value)} className="w-full bg-gray-950 border border-green-900 text-green-500 p-2 focus:outline-none focus:border-green-400 uppercase text-sm"><option value="">-- No Link --</option>{achievements.map(a => <option key={a.id} value={a.id}>{a.text}</option>)}</select></div>)}
            <button type="submit" className={`mt-2 py-3 bg-green-900 bg-opacity-20 border ${neonBorder} flex items-center justify-center gap-2 uppercase tracking-widest text-sm hover:bg-green-800 hover:bg-opacity-40 transition-all`}><Icon name="Plus" size={16} /> Register to System</button>
          </form>

          <div className={`p-4 ${bgPanel} flex flex-col gap-4 mb-6 shadow-[inset_0_0_15px_rgba(0,0,0,1)]`}>
            <h3 className="text-sm uppercase tracking-widest text-green-400 border-b border-green-900 pb-2">Manage Entities</h3>
            <div className="space-y-3 max-h-60 overflow-y-auto scrollbar-hide pr-1">
              {daily.length === 0 && weekly.length === 0 && negative.length === 0 && achievements.length === 0 && <span className="text-xs text-green-800 uppercase tracking-widest">No entities to manage.</span>}
              {daily.map(q => <ManageItem key={`m-${q.id}`} item={q} type="daily" onDelete={() => onDelete(q.id, 'daily')} />)}
              {weekly.map(q => <ManageItem key={`m-${q.id}`} item={q} type="weekly" onDelete={() => onDelete(q.id, 'weekly')} />)}
              {negative.map(q => <ManageItem key={`m-${q.id}`} item={q} type="negative" onDelete={() => onDelete(q.id, 'negative')} />)}
              {achievements.map(a => <ManageItem key={`m-${a.id}`} item={a} type="achievement" onDelete={() => onDelete(a.id, 'achievement')} />)}
            </div>
          </div>

          <div className={`p-4 ${bgPanel} flex flex-col gap-4 mb-6 shadow-[inset_0_0_15px_rgba(0,0,0,1)]`}>
            <h3 className="text-sm uppercase tracking-widest text-green-400 border-b border-green-900 pb-2">Data Management</h3>
            <div className="flex gap-2">
              <button type="button" onClick={() => { sysFeedback.click(); onExport(); }} className="flex-1 py-3 bg-green-900 bg-opacity-20 border border-green-700 flex flex-col items-center justify-center gap-2 uppercase tracking-widest text-xs hover:bg-green-800 hover:bg-opacity-40 transition-all text-green-400"><Icon name="Download" size={18} /> Export Data</button>
              <button type="button" onClick={() => { sysFeedback.click(); fileInputRef.current?.click(); }} className="flex-1 py-3 bg-green-900 bg-opacity-20 border border-green-700 flex flex-col items-center justify-center gap-2 uppercase tracking-widest text-xs hover:bg-green-800 hover:bg-opacity-40 transition-all text-green-400"><Icon name="Upload" size={18} /> Import Data</button>
              <input type="file" accept=".json" className="hidden" ref={fileInputRef} onChange={handleFileChange} />
            </div>
            {importStatus && <div className={`text-xs text-center uppercase tracking-widest p-2 ${importStatus.includes('ERROR') ? 'text-red-400 border border-red-900 bg-red-950' : 'text-green-400 border border-green-900 bg-green-950'}`}>{importStatus}</div>}
          </div>
        </div>
      );
    }

    function ManageItem({ item, type, onDelete }) {
      const isNegative = type === 'negative';
      return (
        <div className="flex justify-between items-center border border-green-900 bg-gray-950 p-2 shadow-[inset_0_0_5px_rgba(0,0,0,0.5)]">
          <div className="flex-1 overflow-hidden pr-2">
            <div className={`text-xs uppercase tracking-wide truncate ${isNegative ? 'text-red-400' : 'text-green-400'}`}>{item.text}</div>
            <div className={`text-[10px] ${item.queued ? 'text-blue-400' : 'text-green-700'}`}>[{type.toUpperCase()}] {item.queued ? '(QUEUED)' : ''} {item.xp} XP</div>
          </div>
          <button onClick={onDelete} className="p-1 text-green-800 hover:text-red-500 hover:bg-red-950 transition-colors border border-transparent hover:border-red-900 rounded"><Icon name="Trash2" size={16} /></button>
        </div>
      );
    }

    function ProgressView({ history, onBack }) {
      const [displayText, setDisplayText] = useState('');
      const fullText = `[SYSTEM DIAGNOSTIC INITIATED]...\n\nHost vitals and magical circuitry scanned.\n\nAnalyzing recent growth patterns...\nCumulative XP accumulation detected. Current trajectory indicates optimal combat ability scaling.\n\nRECOMMENDATION: Continue current operational parameters. Weakness is a sin. ARISE.`;

      useEffect(() => {
        let i = 0;
        const interval = setInterval(() => { setDisplayText(fullText.slice(0, i)); i++; if (i > fullText.length) clearInterval(interval); }, 20);
        return () => clearInterval(interval);
      }, []);

      return (
        <div className="animate-fade-in flex flex-col h-full">
          <div className="flex justify-between items-center border-b border-green-800 pb-2 mb-6"><h2 className="text-xl uppercase tracking-widest text-green-400">Host Progress</h2><button onClick={() => { sysFeedback.click(); onBack(); }} className="text-xs border border-green-800 px-2 py-1 hover:bg-green-900">CLOSE</button></div>
          <div className={`w-full h-48 ${bgPanel} mb-6 relative flex items-end p-2 border-green-600 ${neonGlow}`}>
            {history.length < 2 ? <div className="absolute inset-0 flex items-center justify-center text-green-800 text-xs uppercase text-center p-4">Insufficient data for visual metric projection.</div> : (
              <svg className="w-full h-full overflow-visible" preserveAspectRatio="none">
                {history.map((pt, i) => {
                  if (i === 0) return null;
                  const prev = history[i - 1];
                  const x1 = ((i - 1) / (history.length - 1)) * 100;
                  const x2 = (i / (history.length - 1)) * 100;
                  const maxTotal = Math.max(...history.map(h => h.totalXp), 1);
                  const y1 = 100 - ((prev.totalXp / maxTotal) * 100);
                  const y2 = 100 - ((pt.totalXp / maxTotal) * 100);
                  const isDrop = pt.totalXp < prev.totalXp;
                  return <line key={`line-${pt.id}`} x1={`${x1}%`} y1={`${y1}%`} x2={`${x2}%`} y2={`${y2}%`} stroke={isDrop ? "#ef4444" : "#22c55e"} strokeWidth="2" strokeLinecap="round" className={isDrop ? "drop-shadow-[0_0_5px_rgba(239,68,68,0.8)]" : "drop-shadow-[0_0_5px_rgba(34,197,94,0.8)]"} />
                })}
                {history.map((pt, i) => {
                   const x = (i / (history.length - 1)) * 100;
                   const maxTotal = Math.max(...history.map(h => h.totalXp), 1);
                   const y = 100 - ((pt.totalXp / maxTotal) * 100);
                   const isDrop = i > 0 && pt.totalXp < history[i-1].totalXp;
                   return <circle key={pt.id} cx={`${x}%`} cy={`${y}%`} r="3" fill="#000" stroke={isDrop ? "#ef4444" : "#22c55e"} strokeWidth="1.5" />
                })}
              </svg>
            )}
          </div>
          <div className="flex-1 overflow-hidden">
            <div className="h-full bg-gray-950 border border-green-900 p-4 text-sm leading-relaxed text-green-400 font-mono whitespace-pre-wrap">{displayText}<span className="animate-pulse">_</span></div>
          </div>
        </div>
      );
    }

    function NavButton({ icon, label, isActive, onClick }) {
      return (
        <button onClick={() => { sysFeedback.click(); onClick(); }} className={`flex flex-col items-center justify-center py-3 transition-colors ${isActive ? 'text-green-400 bg-gray-900 bg-opacity-40 border-t-2 border-green-400' : 'text-green-800 hover:text-green-600'}`}>
          <div className={isActive ? 'drop-shadow-[0_0_8px_rgba(34,197,94,0.8)]' : ''}>{icon}</div>
          <span className="text-[10px] mt-1 uppercase tracking-widest">{label}</span>
        </button>
      );
    }

    function QuestItem({ item, onToggle, isNegative = false, isAchievement = false }) {
      const clickableClass = onToggle ? 'cursor-pointer' : 'cursor-default opacity-80';
      const baseActive = isNegative ? 'border-red-700 shadow-[inset_0_0_10px_rgba(239,68,68,0.05)]' : 'border-green-700 shadow-[inset_0_0_10px_rgba(34,197,94,0.05)]';
      const hoverActive = isNegative ? 'hover:border-red-400 hover:bg-red-950 hover:shadow-[0_0_10px_rgba(239,68,68,0.4)]' : 'hover:border-green-400 hover:bg-green-950 hover:shadow-[0_0_10px_rgba(34,197,94,0.4)]';
      const activeBorder = `${baseActive} ${onToggle ? hoverActive : ''}`;
      const completedBorder = isNegative ? 'border-red-900 bg-gray-900 opacity-60' : 'border-green-900 bg-gray-900 opacity-60';
      
      return (
        <div onClick={onToggle} className={`p-4 flex items-center gap-4 border transition-all duration-300 ${clickableClass} ${item.completed ? completedBorder : `bg-black ${activeBorder}`}`}>
          <div className={`${isNegative ? 'text-red-500' : 'text-green-500'} flex-shrink-0`}>{item.completed ? <Icon name="CheckSquare" size={20} /> : <Icon name="Square" size={20} />}</div>
          <div className="flex-1">
            <div className={`text-sm uppercase tracking-wide ${item.completed ? `line-through ${isNegative ? 'text-red-700' : 'text-green-700'}` : (isNegative ? 'text-red-300' : 'text-green-300')}`}>{item.text}</div>
            {isAchievement && item.maxProgress > 0 && (
              <div className="w-full bg-gray-950 h-1.5 mt-2 rounded overflow-hidden border border-green-900"><div className="bg-green-500 h-full shadow-[0_0_5px_#22c55e] transition-all duration-500" style={{ width: `${(item.progress / item.maxProgress) * 100}%` }} /></div>
            )}
          </div>
          <div className={`text-xs font-bold px-2 py-1 rounded ${isNegative ? (item.completed ? 'text-red-800' : 'text-black bg-red-500 drop-shadow-[0_0_5px_rgba(239,68,68,1)]') : (item.completed ? 'text-green-800' : 'text-black bg-green-500 drop-shadow-[0_0_5px_rgba(34,197,94,1)]')}`}>
            {isNegative ? '-' : '+'}{item.xp} XP
          </div>
        </div>
      );
    }

    function EmptyState({ text }) {
      return <div className="text-center p-6 border border-dashed border-green-900 text-green-800 text-sm uppercase tracking-widest">{text}</div>;
    }

    // --- RENDER APP ---
    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
